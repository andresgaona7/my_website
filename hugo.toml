theme = 'LoveIt'
title = "AG website"
#languageCode = "en"
#languageName = "English"
#enableRobotsTXT = true

ignoreErrors = ["error-remote-getjson", "error-missing-instagram-accesstoken"]

[caches]
  [caches.images]
    dir = ':cacheDir/images'

# Menu config
[menu]
    [[menu.main]]
        weight = 1
        identifier = "posts"
        pre = "📚"
        name = "Posts"
        url = "/posts/"

    [[menu.main]]
        weight = 1
        identifier = "about"
        pre = "🫆"
        name = "About me"
        url = "/about/"

[params]
    defaultTheme = "auto"
    title = "Andres Gaona"

    # Author config
    [params.author]
        name = "Andres Gaona"
        email = "adgaona7@gmail.com"
        link = ""

    # Header config
    [params.header]
        desktopMode = "fixed"
        mobileMode = "auto"

        [params.header.title]
            logo = ""
            name = "Andrés Gaona"
            pre = ""
            post = ""
            typeit = false

    # Footer config
    [params.footer]
        enable = true
        custom = ''
        hugo = false
        copyright = true
        author = true
        since = 2019
        icp = ""

    # Home page config
    [params.home]
        # LoveIt NEW | 0.2.0 amount of RSS pages
        rss = 10

        # Home page profile
        [params.home.profile]
            enable = true
            # Gravatar Email for preferred avatar in home page
            # gravatarEmail = "adgaona7@gmail.com"
            # URL of avatar shown in home page
            avatarURL = "images/avatar.png"
            # LoveIt CHANGED | 0.2.7 title shown in home page (HTML format is supported)
            title = ""
            # subtitle shown in home page (HTML format is supported)
            subtitle = "Robotics engineer building intelligent real-time robotic systems."
            # whether to use typeit animation for subtitle
            typeit = true
            # whether to show social links
            social = true
            # LoveIt NEW | 0.2.0 disclaimer (HTML format is supported)
            disclaimer = ""

        # Home page posts
        [params.home.posts]
            enable = true
            # special amount of posts in each home posts page
            paginate = 6
            # LoveIt DELETED | 0.2.0 replaced with hiddenFromHomePage in params.page
            # default behavior when you don't set "hiddenFromHomePage" in front matter
            defaultHiddenFromHomePage = false

    [params.social]
        GitHub = "andresgaona7"